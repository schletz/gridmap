<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Map</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
        integrity="sha512-h9FcoyWjHcOcmEVkxOfTLnmZFWIH0iZhZT1H2TbOq55xssQGEJHEaIm+PgoUaZbRvQTNTluNOEfb1ZRy6D3BOw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
        integrity="sha512-puJW3E/qXDqYp9IfhAI54BJEaWIfloJ7JWs7OeD5i6ruC9JZL1gERT1wjtwXFlh7CjE7ZJ+/vcRZRkIYIb6p4g=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>


    <script src="leaflet-grids.js"></script>
    <script src="searchForm.js"></script>

    <style type="text/css">
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0px;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
        }

        #map {
            flex-grow: 1;
        }

        #options {
            flex-grow: 0;
            display: flex;
            column-gap: 1em;
            padding: 0.25em 1em;
        }

        #options div {
            display: flex;
            column-gap: 1em;
        }

        #options div > div {
            cursor: pointer;
        }

        .grid-label {
            color: black;
            font: bold 12pt sans-serif;
            text-shadow: -2px -2px 0px yellow, -2px 2px 0px yellow, 2px -2px 0px yellow, 2px 2px 0px yellow;
        }

        .lng {
            transform: rotate(-90deg);
        }
    </style>
</head>

<body>
    <div id="options">
        <div id="step">
            <div data-val="36000" data-unit="sec">10°</div>
            <div data-val="18000" data-unit="sec">5°</div>
            <div data-val="3600" data-unit="sec">1°</div>
            <div data-val="2700" data-unit="sec">0.75°</div>
            <div data-val="1800" data-unit="sec">0.5°</div>
            <div data-val="900" data-unit="sec">0.25°</div>
            <div data-val="450" data-unit="sec">0.125°</div>
            <div data-val="360" data-unit="sec">0.1°</div>
            <div data-val="60" data-unit="sec">1'</div>
            <div data-val="10" data-unit="sec">10"</div>
            <div data-val="6" data-unit="sec">0.1'</div>
            <div data-val="1" data-unit="sec">1"</div>
            <div data-val="1000000" data-unit="m">1000km</div>
            <div data-val="100000" data-unit="m">100km</div>
            <div data-val="10000" data-unit="m">10km</div>
            <div data-val="1000" data-unit="m">1km</div>
            <div data-val="100" data-unit="m">100m</div>
        </div>
        <div id="mapType">
            <div data-val="0">OSM</div>
            <div data-val="1">Basemap</div>
            <div data-val="2">Luftbild</div>
            <div data-val="3">Topo</div>
            <div data-val="4">OEK</div>
        </div>
        <div id="searchbar">
            <form id="searchForm">
                <input type="text" size=20 name="ort" id="ort">
                <button type="button" onclick="SearchForm.searchLocation();">Gehe zu</button>
            </form>
        </div>
    </div>

    <div id="map"></div>

    <script type="text/javascript">
        let map = null;
        let mapLayers = [];
        let currentTitleLayer = null;
        let currentGrid = null;

        map = new L.Map('map', { zoomControl: true }).setView([48, 15], 6);
        SearchForm.mapInstance = map;
        SearchForm.container = "#searchForm";

        mapLayers.push(L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }));
        mapLayers.push(L.tileLayer('https://mapsneu.wien.gv.at/basemap/bmaphidpi/normal/google3857/{z}/{y}/{x}.jpeg', { maxZoom: 19 }));
        mapLayers.push(L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
        }));
        mapLayers.push(L.tileLayer('https://tiles.bergfex.at/styles/bergfex-osm/{z}/{x}/{y}.jpg', { maxZoom: 19 }));
        mapLayers.push(L.tileLayer('https://tiles.bergfex.at/styles/bergfex-oek/{z}/{x}/{y}.jpg', { maxZoom: 16 }));

        mapLayers[0].addTo(map);

        // Grid step selection
        document.querySelectorAll("#step div").forEach(li => {
            li.addEventListener("click", () => {
                const step = parseFloat(li.dataset.val);
                const unit = li.dataset.unit;
                if (currentGrid !== null) currentGrid.remove();
                if (unit === "sec") currentGrid = L.grids.dd();
                if (unit === "m") currentGrid = L.grids.distance.metric();
                currentGrid.options.coordinateGridSpacing = step;
                currentGrid.addTo(map);
            });
        });

        // Map layer switching
        document.querySelectorAll("#mapType div").forEach(li => {
            li.addEventListener("click", () => {
                const layerNr = parseInt(li.dataset.val, 10);
                mapLayers.forEach(layer => {
                    if (Array.isArray(layer)) {
                        layer.forEach(l => map.removeLayer(l));
                    } else {
                        map.removeLayer(layer);
                    }
                });
                const selected = mapLayers[layerNr];
                if (Array.isArray(selected)) {
                    selected.forEach(l => l.addTo(map));
                } else {
                    selected.addTo(map);
                }
            });
        });
    </script>
    <script>
        const locationCircleGroup = L.layerGroup().addTo(map);
        const labelLayerGroup = L.layerGroup().addTo(map);
        let locationMarker = null;
        let lastLatLng = null;
        let initialPositioned = false;
        let lastPositionUpdateTime = 0;


        const circleRadii = [
            100, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 2000, 3000,
            4000, 5000, 6000, 7000, 8000, 9000, 10000, 15000, 20000, 25000, 30000,
            35000, 40000, 45000, 50000, 55000, 60000
        ];

        function drawDistanceCircles(latlng) {
            locationCircleGroup.clearLayers();
            const zoom = map.getZoom();

            circleRadii.forEach(radius => {
                if ((radius >= 10000 || zoom >= 10) && (radius >= 1000 || zoom >= 14)) {
                    const circle = L.circle(latlng, {
                        radius: radius,
                        color: "#007bff",
                        weight: 1,
                        fillOpacity: 0
                    });
                    circle.addTo(locationCircleGroup);
                }
            });
        }

        function createDistanceLabel(latlng, radius, fontSize = 12, marginTop = 0, marginLeft = 0) {
            return L.marker(latlng, {
                icon: L.divIcon({
                    className: 'distance-label',
                    html: `<div style="margin-top:${marginTop}px; margin-left:${marginLeft}px; font-size:${fontSize}px; color:#00254d; font-weight:bolder;">
                ${radius >= 1000 ? (radius / 1000) + "km" : radius + "m"}
            </div>`,
                    iconSize: [30, 12],
                    iconAnchor: [15, 6]
                })
            });
        }

        function drawDistanceLabels(latlng) {
            labelLayerGroup.clearLayers();
            const zoom = map.getZoom();
            const bounds = map.getBounds();

            const viewTop = bounds.getNorth();
            const viewBottom = bounds.getSouth();
            const viewLeft = bounds.getWest();
            const viewRight = bounds.getEast();

            const φ1 = latlng[0] * Math.PI / 180;
            const λ1 = latlng[1] * Math.PI / 180;
            const earthRadius = 6371000;

            circleRadii.forEach(radius => {
                if ((radius >= 10000 || zoom >= 10) && (radius >= 1000 || zoom >= 14)) {
                    const δ = radius / earthRadius;

                    // 1a. Direkter Nordpunkt des Kreises
                    const circleTopLat = (φ1 + δ) * 180 / Math.PI;
                    const circleBottomLat = (φ1 - δ) * 180 / Math.PI;
                    if (circleTopLat <= viewTop && circleBottomLat >= viewBottom) {
                        createDistanceLabel(L.latLng(circleTopLat, latlng[1]), radius, 12, 0, 0).addTo(labelLayerGroup);
                        createDistanceLabel(L.latLng(circleBottomLat, latlng[1]), radius, 12, 0, 0).addTo(labelLayerGroup);
                        return;
                    }

                    // 2. Beide Schnittpunkte mit oberem Rand (Latitude = viewTop)
                    const φ_view = viewTop * Math.PI / 180;
                    const cosArgTop = (Math.cos(δ) - Math.sin(φ1) * Math.sin(φ_view)) /
                        (Math.cos(φ1) * Math.cos(φ_view));
                    if (Math.abs(cosArgTop) <= 1) {
                        const angle = Math.acos(cosArgTop);
                        const λ_right = λ1 + angle;
                        const λ_left = λ1 - angle;

                        const lngRight = λ_right * 180 / Math.PI;
                        const lngLeft = λ_left * 180 / Math.PI;

                        createDistanceLabel(L.latLng(viewTop, lngRight), radius, 16, 10, 0).addTo(labelLayerGroup);
                        createDistanceLabel(L.latLng(viewTop, lngLeft), radius, 16, 10, 0).addTo(labelLayerGroup);
                    }
                }
            });
        }

        // Standort anzeigen
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    const now = Date.now();
                    if (now - lastPositionUpdateTime < 1000) return;
                    const latlng = [position.coords.latitude, position.coords.longitude];
                    drawDistanceCircles(latlng);
                    drawDistanceLabels(latlng);
                    // Blauer Punkt an der aktuellen Position
                    if (!initialPositioned) {
                        map.setView(latlng, 15);
                        locationMarker = L.circleMarker(latlng, {
                            radius: 6,
                            color: '#007bff',
                            fillColor: '#007bff',
                            fillOpacity: 1,
                            weight: 2
                        }).addTo(map);
                        initialPositioned = true;
                    }
                    else {
                        locationMarker.setLatLng(latlng);
                    }
                    lastLatLng = latlng;
                    lastPositionUpdateTime = now;
                },
                (err) => {
                    console.warn('Geolocation error:', err.message);
                },
                {
                    enableHighAccuracy: true
                }
            );
        }

        map.on('zoomend', () => {
            if (lastLatLng) {
                drawDistanceCircles(lastLatLng);
                drawDistanceLabels(lastLatLng);
            }
        });

        map.on('moveend', () => {
            if (lastLatLng) {
                drawDistanceLabels(lastLatLng);
            }
        });

    </script>

</body>

</html>
